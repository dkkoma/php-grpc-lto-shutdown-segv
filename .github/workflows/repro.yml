name: repro

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      n:
        description: iterations per service per arch
        default: "500"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the compose project name so the image tag we pre-build with buildx
  # (`repro-<service>:latest`) matches what `docker compose run` looks up.
  COMPOSE_PROJECT_NAME: repro

jobs:
  reproduce:
    name: ${{ matrix.os }} / ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest        # GitHub-hosted x86_64
          - ubuntu-24.04-arm     # GitHub-hosted aarch64
        service:
          - php85-debian
          - php85-lto
          - php85-nolto
          - php85-ltoonly
          - php85-lto-shutdownblocking
          - php85-lto-waitforasync
          - php85-lto-shutdownee
          - php85-lto-shutdownee-stalled
          - php85-lto-nodelete
    runs-on: ${{ matrix.os }}
    # Cap each cell so a hung iteration doesn't burn the GHA hosted-runner
    # 49-min "lost communication" timeout — fail fast and visibly instead.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        env:
          # build-push-action v6 otherwise auto-uploads a per-job
          # `*.dockerbuild` summary artifact (~MB each); 18 of them break
          # the summary job's download-artifact step.
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          target: ${{ matrix.service }}
          tags: repro-${{ matrix.service }}:latest
          load: true
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.os }}
          cache-to: type=gha,scope=${{ matrix.service }}-${{ matrix.os }},mode=max

      - name: Run ${{ matrix.service }}
        env:
          N: ${{ github.event.inputs.n || '500' }}
        run: |
          set -o pipefail
          docker compose run --rm -e N=$N ${{ matrix.service }} | tee out.log
          tail -n1 out.log > result.txt

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}__${{ matrix.service }}
          path: result.txt
          if-no-files-found: ignore

      - name: Tear down compose
        if: always()
        run: docker compose down -v

  summary:
    name: result matrix
    needs: reproduce
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          # Only the result-matrix artifacts uploaded above; skip anything
          # else (e.g. build-push-action's auto `*.dockerbuild` summaries).
          pattern: 'ubuntu-*__php85-*'

      - name: Render result matrix to step summary
        run: |
          services=(
            php85-debian
            php85-lto
            php85-nolto
            php85-ltoonly
            php85-lto-shutdownblocking
            php85-lto-waitforasync
            php85-lto-shutdownee
            php85-lto-shutdownee-stalled
            php85-lto-nodelete
          )
          oses=(ubuntu-latest ubuntu-24.04-arm)
          archs=(x86_64 aarch64)

          {
            echo "## Repro result matrix"
            echo
            echo "Each cell is \`segv / N (rate)\`. \`(failed)\` means the job did not produce a result."
            echo
            printf "| service |"
            for a in "${archs[@]}"; do printf " %s |" "$a"; done
            printf "\n|---|"
            for _ in "${archs[@]}"; do printf '%s' "---|"; done
            printf "\n"

            for svc in "${services[@]}"; do
              printf "| %s" "$svc"
              for i in "${!oses[@]}"; do
                os="${oses[$i]}"
                f="artifacts/${os}__${svc}/result.txt"
                cell="(failed)"
                if [ -f "$f" ]; then
                  line="$(cat "$f")"
                  n="$(printf '%s' "$line" | sed -n 's/.*N=\([0-9]*\).*/\1/p')"
                  segv="$(printf '%s' "$line" | sed -n 's/.*segv=\([0-9]*\).*/\1/p')"
                  if [ -n "$n" ] && [ -n "$segv" ] && [ "$n" -gt 0 ]; then
                    rate="$(awk -v s="$segv" -v n="$n" 'BEGIN{printf "%.1f%%", s*100/n}')"
                    cell="${segv} / ${n} (${rate})"
                  fi
                fi
                printf " | %s" "$cell"
              done
              printf " |\n"
            done
          } >> "$GITHUB_STEP_SUMMARY"
